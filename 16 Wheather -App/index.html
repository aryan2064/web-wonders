<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>Weather App</h1>
  </header>

  <main class="main-content">
    <section class="search-section">
      <input type="text" id="cityInput" placeholder="Enter city name...">
      <button id="searchBtn">Get Weather</button>
    </section>

    <div id="message" class="message"></div>

    <section id="weatherResult" class="weather-section hidden">
      <div class="weather-header">
        <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
        <h2 id="cityName" class="city-name"></h2>
      </div>
      <div class="weather-details">
        <div class="detail">
          <span class="label">Temperature</span>
          <span id="temperature" class="value"></span>
        </div>
        <div class="detail">
          <span class="label">Condition</span>
          <span id="condition" class="value"></span>
        </div>
        <div class="detail">
          <span class="label">Humidity</span>
          <span id="humidity" class="value"></span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
