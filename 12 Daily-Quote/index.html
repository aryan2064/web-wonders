<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Quotes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1 class="title">Daily Quotes</h1>

    <div class="quote-box">
      <p id="quote-text" class="quote-text">Loading...</p>
      <p id="quote-author" class="quote-author"></p>
    </div>

    <div class="buttons">
      <button id="new-quote-btn" class="btn btn-primary">New Quote</button>
      <button id="copy-btn" class="btn btn-secondary">Copy Quote</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
