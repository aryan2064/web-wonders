<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card" id="card">
      <h1 class="title">Pomodoro Timer</h1>
      <div class="settings" id="settings">
        <div class="setting-group">
          <label for="workInput">Work (min)</label>
          <input type="number" id="workInput" min="1" max="120" value="25" />
        </div>
        <div class="setting-group">
          <label for="breakInput">Break (min)</label>
          <input type="number" id="breakInput" min="1" max="60" value="5" />
        </div>
      </div>
      <p class="mode" id="mode">Work Time</p>
      <div class="timer" id="timer">25:00</div>
      <div class="buttons">
        <button class="btn btn-start" id="startBtn">Start</button>
        <button class="btn btn-pause" id="pauseBtn">Pause</button>
        <button class="btn btn-reset" id="resetBtn">Reset</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
